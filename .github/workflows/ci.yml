name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} sanitizers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cxx: g++
          - compiler: Clang
            cxx: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DRVEMU_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  benchmark-smoke:
    name: Benchmark harness smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Configure release benchmark build
        run: >-
          cmake -S . -B build-benchmarks
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DRVEMU_BUILD_CLI=OFF
          -DRVEMU_BUILD_BENCHMARKS=ON

      - name: Build benchmark harness
        run: >-
          cmake --build build-benchmarks
          --target rvemu_benchmarks
          --parallel 2

      - name: Run deterministic smoke iteration
        run: >-
          ./build-benchmarks/rvemu_benchmarks
          --benchmark_dry_run
          --benchmark_format=json
